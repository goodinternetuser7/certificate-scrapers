name: Monthly CSV Email Digest

on:
  schedule:
    # 12:00 UTC on the 8th — after every scraper has committed its dashboard for
    # the month (ISCC/SURE/PEFC/FSC/SBP on the 1st, GGL on the 8th at 10:00).
    - cron: '0 12 8 * *'
  workflow_dispatch:

jobs:
  email:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install --quiet openpyxl

      - name: Export CSVs from committed dashboards
        run: python export_csvs.py

      - name: Date stamp
        run: echo "DATE=$(date -u +%Y-%m-%d)" >> "$GITHUB_ENV"

      - name: Send email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "Certificate register CSVs — ${{ env.DATE }}"
          to: maris.zamovskis@bmcertification.com
          from: Certificate Scrapers <${{ secrets.MAIL_USERNAME }}>
          attachments: certificate-csvs-*.zip
          body: |
            Monthly export of all public certificate-register CSVs, attached as a
            single zip:

              • ISCC   • SURE   • PEFC   • FSC   • GGL   • SBP

            Rebuilt from the latest committed dashboards in
            goodinternetuser7/certificate-scrapers. Automated message — do not reply.
