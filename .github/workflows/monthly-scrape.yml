name: Monthly ISCC Certificate Scraper

on:
  schedule:
    - cron: '0 6 1 * *'   # 06:00 UTC on the 1st of every month
  workflow_dispatch:        # allow manual runs from the GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # needed to commit the xlsx back to the repo

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install --quiet -r requirements.txt

      - name: Run scraper
        run: python scraper.py

      - name: Generate Excel dashboard
        run: python generate_excel.py

      - name: Commit and push Excel files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Stage xlsx files; remove any stale csvs that may be left in the repo
          git rm -f --ignore-unmatch "ISCC certificates"*.csv
          git add "ISCC certificates"*.xlsx
          git diff --cached --quiet && echo "No changes to commit." && exit 0
          git commit -m "chore: monthly ISCC certificate scrape $(date -u +%Y-%m-%d)"
          git push
