name: Monthly Combined Workbook

on:
  schedule:
    # 11:00 UTC on the 8th — after every scraper has committed its dashboard
    # (ISCC/SURE/PEFC/FSC/SBP on the 1st, GGL on the 8th at 10:00).
    - cron: '0 11 8 * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install --quiet openpyxl

      # One UTC date, shared by the build and the commit, so the dated
      # filename can't drift if the run straddles midnight.
      - name: Date stamp
        run: echo "COMBINED_DATE=$(date -u +%Y.%m.%d)" >> "$GITHUB_ENV"

      - name: Build combined workbook
        run: python build_combined.py

      - name: Commit and push combined workbook
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          DATED="All certificates ${COMBINED_DATE}.xlsx"
          # Keep a dated copy (the email links to it) plus the stable "latest".
          # Drop any previously-committed dated copy so the repo keeps just one.
          git rm --quiet --cached --ignore-unmatch 'All certificates 20*.xlsx' || true
          git add "$DATED" "All certificates latest.xlsx"
          git diff --cached --quiet && echo "No changes to commit." && exit 0
          git commit -m "chore: rebuild combined workbook $(date -u +%Y-%m-%d)"
          git push
