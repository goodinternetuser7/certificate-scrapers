name: Email Combined Workbook

# On-demand only. The full combined workbook (~26 MB) is too big for Gmail, so
# this emails the slim dashboard copy build_combined.py produces — the
# interactive Dashboard + normalised Data sheet, ~10 MB. The full workbook (with
# a detail sheet per scheme) lives in the repo for download.
on:
  workflow_dispatch:

jobs:
  email:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install --quiet openpyxl

      - name: Build combined workbook
        run: python build_combined.py

      - name: Zip slim dashboard workbook
        run: zip -9 "combined-workbook.zip" "All certificates (dashboard) latest.xlsx"

      - name: Date stamp
        run: echo "DATE=$(date -u +%Y-%m-%d)" >> "$GITHUB_ENV"

      - name: Send email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "Combined certificate workbook — ${{ env.DATE }}"
          to: maris.zamovskis@bmcertification.com
          from: Certificate Scrapers <${{ secrets.MAIL_USERNAME }}>
          attachments: combined-workbook.zip
          body: |
            Attached (zipped): the combined certificate workbook — an interactive
            Dashboard (Select Country → certificates by scheme; Select Scheme →
            top countries) over one normalised Data sheet spanning ISCC, SURE,
            PEFC, FSC, GGL and SBP (~196k rows).

            This is the slim copy (dashboard + data) so it fits email. The full
            workbook, with a detail sheet per scheme, is in the repo:
            https://github.com/goodinternetuser7/certificate-scrapers/blob/master/All%20certificates%20latest.xlsx

            Automated message — do not reply.
