name: Email Combined Workbook

# On-demand only. Sends a LINK-only email (no attachment). An earlier version
# attached the ~10 MB zip, but a Gmail sender → Microsoft 365 recipient with a
# zip attachment gets quarantined by Defender/EOP on the receiving side (the
# SMTP send still reports success, so the mail silently never arrives). The repo
# is public, so a plain link downloads without any GitHub login and a tiny
# text-only email sails through filtering. The workbook itself is kept fresh on
# master by the "Monthly Combined Workbook" job (and its manual dispatch).
on:
  workflow_dispatch:

jobs:
  email:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Date stamp
        run: echo "DATE=$(date -u +%Y-%m-%d)" >> "$GITHUB_ENV"

      - name: Send email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "Combined certificate workbook — ${{ env.DATE }}"
          to: maris.zamovskis@bmcertification.com
          from: Certificate Scrapers <${{ secrets.MAIL_USERNAME }}>
          body: |
            The latest combined certificate workbook is ready to download:

            https://github.com/goodinternetuser7/certificate-scrapers/raw/master/All%20certificates%20latest.xlsx

            It's a single normalised "All Certificates" sheet plus a detail sheet
            per scheme, spanning ISCC, SURE, PEFC, FSC, GGL and SBP (~196k rows),
            with dates as real Excel dates so everything sorts together.

            The link downloads the file directly (the repo is public — no login
            needed). It's refreshed on the 8th of each month.

            Automated message — do not reply.
