name: Monthly SURE Certificate Scraper

on:
  schedule:
    - cron: '0 7 1 * *'   # 07:00 UTC on the 1st of every month (1 hr after ISCC)
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install --quiet -r requirements.txt

      - name: Run scraper
        run: python scraper_sure.py

      - name: Generate Excel dashboard
        run: python generate_excel_sure.py

      - name: Commit and push Excel files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git rm -f --ignore-unmatch "SURE certificates"*.csv
          git add "SURE certificates"*.xlsx
          git diff --cached --quiet && echo "No changes to commit." && exit 0
          git commit -m "chore: monthly SURE certificate scrape $(date -u +%Y-%m-%d)"
          git push
