name: Monthly RSPO Member Scraper

on:
  schedule:
    - cron: '0 12 1 * *'   # 12:00 UTC on the 1st of every month (after the others)
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install --quiet -r requirements.txt

      - name: Run scraper
        run: python scraper_rspo.py

      - name: Generate Excel dashboard
        run: python generate_excel_rspo.py

      - name: Commit and push Excel files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git rm -f --ignore-unmatch "RSPO members"*.csv
          git add "RSPO members"*.xlsx
          git diff --cached --quiet && echo "No changes to commit." && exit 0
          git commit -m "chore: monthly RSPO member scrape $(date -u +%Y-%m-%d)"
          git push
